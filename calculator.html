<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="/calculator_html-css-js//calculator.css" />
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

  </head>
  <body>
    <div class="box "style="flex-direction: column"
      <h1 id="heno" >calculator</h1>
      
      <div class="container"  data-aos="zoom-in"
      data-aos-anchor-placement="center-bottom" >
        <input type="text" id="display" readonly />
        <div class="btn-section">
          <button class="btn" onclick="seven()">7</button>
          <button class="btn" onclick="eight()">8</button>
          <button class="btn" onclick="nine()">9</button>
          <button class="btn btn-opr" onclick="clearDisplay()">C</button>
          <button class="btn" onclick="four()">4</button>
          <button class="btn" onclick="five()">5</button>
          <button class="btn" onclick="six()">6</button>
          <button class="btn btn-opr" onclick="multi()">x</button>
          <button class="btn" onclick="one()">1</button>
          <button class="btn" onclick="two()">2</button>
          <button class="btn" onclick="three()">3</button>
          <button class="btn btn-opr " onclick="substraction()">-</button>
          <button class="btn" onclick="del()">n</button>
          <button class="btn" onclick="zero()">0</button>
          <button class="btn spl" onclick="calc()">=</button>
          <button class="btn btn-opr" onclick="plus()">+</button>
        </div>
      </div>
    </div>

    <script src="/calculator_html-css-js//calculator.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
<script>
  AOS.init({
    offset: 20,
    duration: 1000,
  });
</script>
  </body>
</html>
